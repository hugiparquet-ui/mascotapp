<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ============================================ -->
    <!-- TÍTULO Y DESCRIPCIÓN -->
    <!-- ============================================ -->
    <title>MascotApp</title>
    <meta name="description" content="Encuentra, adopta, cuida y protege a tu compañero peludo." />

    <!-- ============================================ -->
    <!-- FAVICON (tu logo SVG) -->
    <!-- ============================================ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ============================================ -->
    <!-- MANIFEST (PWA) -->
    <!-- ============================================ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FB923C" />

    <!-- ============================================ -->
    <!-- iOS META TAGS (generadas por pwa-asset-generator) -->
    <!-- ============================================ -->
    <link rel="apple-touch-icon" href="/icons/apple-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MascotApp" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ============================================ -->
    <!-- iOS SPLASH SCREENS (las principales) -->
    <!-- ============================================ -->
    <link
      rel="apple-touch-startup-image"
      href="/icons/apple-splash-1334-750.jpg"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/icons/apple-splash-640-1136.jpg"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/icons/apple-splash-1136-640.jpg"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    />

    <!-- Si el generador creó más splash screens, puedes agregarlas aquí (opcional) -->

    <!-- ============================================ -->
    <!-- LEAFLET CSS (para el mapa) -->
    <!-- ============================================ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
